name: AL-OCR Core CI
on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

permissions:
  contents: read

jobs:
  test:
    name: Build & Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install System Dependencies (Tesseract & Leptonica)
        run: |
          # Hosted runners can include transient Microsoft/Azure apt sources
          # under varying filenames; remove any matching entries defensively.
          for src in /etc/apt/sources.list.d/*.list /etc/apt/sources.list.d/*.sources; do
            [ -e "$src" ] || continue
            if grep -qiE 'packages\\.microsoft\\.com|azure-cli' "$src"; then
              sudo rm -f "$src"
            fi
          done
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository -y ppa:alex-p/tesseract-ocr5
          sudo apt-get update
          sudo apt-get install -y \
            tesseract-ocr \
            tesseract-ocr-spa \
            tesseract-ocr-eng \
            libtesseract-dev \
            libleptonica-dev \
            pkg-config \
            libgl1 \
            libglib2.0-0

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          pip install -e ./ocr_reconstruct

      - name: Generate synthetic images
        run: |
          # The images should be in ocr_reconstruct/tests/samples or data/raw
          python ocr_reconstruct/tests/generate_samples.py

      - name: Run Unit & Integration Tests
        env:
          PYTHONPATH: ${{ github.workspace }}
          OCR_API_KEY: "test-key"
        run: python -m pytest --cov-report=term --cov-report=xml

      - name: Upload Test Coverage
        if: always() && hashFiles('coverage.xml') != ''
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: coverage-report-${{ matrix.python-version }}
          path: coverage.xml
