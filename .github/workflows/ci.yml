---
name: AL-OCR Core CI
on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

permissions:
  contents: read

jobs:
  test:
    name: Build & Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install System Dependencies (Tesseract & Leptonica)
        run: |
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository -y ppa:alex-p/tesseract-ocr5
          sudo apt-get update
          sudo apt-get install -y \
            tesseract-ocr \
            tesseract-ocr-spa \
            tesseract-ocr-eng \
            libtesseract-dev \
            libleptonica-dev \
            pkg-config \
            libgl1 \
            libglib2.0-0

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          pip install -e ./ocr_reconstruct

      - name: Generate synthetic images
        run: |
          python ocr_reconstruct/tests/generate_samples.py

      - name: Run Unit & Integration Tests
        env:
          PYTHONPATH: ${{ github.workspace }}
          OCR_API_KEY: "test-key"
        run: python -m pytest --cov-report=term --cov-report=xml

      - name: Upload Test Coverage
        if: always() && hashFiles('coverage.xml') != ''
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report-${{ matrix.python-version }}
          path: coverage.xml
