---
name: Lint & Validate Configs

on:
  push:
    branches: ["main", "master", "develop"]
  pull_request:
    branches: ["main", "master", "develop"]

permissions:
  contents: read
  pull-requests: read

jobs:
  yaml-lint:
    name: YAML Linting
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@8d9ed9a8d614326213d65127602772e1e8707f4d # v6.0.0
        with:
          python-version: "3.11"

      - name: Install yamllint
        run: pip install yamllint

      - name: Run yamllint
        run: |
          yamllint .github/workflows/ docker-compose.yml bandit.yaml .pre-commit-config.yaml

  json-lint:
    name: JSON Linting
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8 # v6.2.0
        with:
          node-version: "20"

      - name: Validate JSON files
        run: |
          for file in $(find . -name "*.json" -not -path "*/node_modules/*" \
                        -not -path "*/.venv/*" -not -path "*/dist/*"); do
            echo "Validating $file"
            if ! python3 -m json.tool "$file" > /dev/null; then
              echo "❌ Invalid JSON: $file"
              exit 1
            fi
          done
          echo "✅ All JSON files are valid"

  secret-scanning:
    name: Secret Scanning with gitleaks
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v6.0.2
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@83373cf0369666678796707e78b1ad8e9741048e # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
