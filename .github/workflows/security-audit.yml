---
name: Security Audit

on:
  workflow_dispatch:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

permissions:
  contents: read
  pull-requests: read

jobs:
  security-audit:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@39751155f0af13c2f8dbf60102c14c7427eda028 # v6.0.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --upgrade pip pip-audit

      - name: Run pip-audit (Python deps)
        run: pip-audit -r requirements.txt --ignore-vuln CVE-2025-69872

      - name: Set up Node.js
        uses: actions/setup-node@1d99fba2f9c7b3d41c80019117ef33847d0a2495 # v6.2.0
        with:
          node-version: "18"

      - name: Prepare frontend lockfile
        working-directory: ./frontend
        run: npm install --package-lock-only --legacy-peer-deps

      - name: Run npm audit (JS deps)
        working-directory: ./frontend
        run: |
          npm audit fix --force || true
          npm audit --audit-level=critical --json > npm-audit-report.json || true

      - name: Run gitleaks (Secret scan)
        uses: gitleaks/gitleaks-action@f699513b049573f8a4a19bb0836f8c4609755ff1 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload security reports
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v6.0.0
        with:
          name: security-reports
          path: |
            frontend/npm-audit-report.json
          if-no-files-found: warn
