---
name: Security Audit

on:
  workflow_dispatch:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

permissions:
  contents: read

jobs:
  security-audit:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --upgrade pip pip-audit

      - name: Run pip-audit (Python deps)
        run: pip-audit -r requirements.txt --ignore-vuln CVE-2025-69872

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "18"

      - name: Prepare frontend lockfile
        working-directory: ./frontend
        run: npm install --package-lock-only --legacy-peer-deps

      - name: Run npm audit (JS deps)
        working-directory: ./frontend
        run: npm audit --audit-level=high --json > npm-audit-report.json
      - name: Run gitleaks (Secret scan)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload security reports
        uses: actions/upload-artifact@v6
        with:
          name: security-reports
          path: |
            frontend/npm-audit-report.json
          if-no-files-found: warn
