---
name: Security Audit

on:
  workflow_dispatch:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

permissions:
  contents: read
  pull-requests: read

jobs:
  security-audit:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@f67713930256393969f8273536b95a445d066417 # v6.0.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --upgrade pip pip-audit

      - name: Run pip-audit (Python deps)
        run: pip-audit -r requirements.txt --ignore-vuln CVE-2025-69872

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v6.2.0
        with:
          node-version: "18"

      - name: Prepare frontend lockfile
        working-directory: ./frontend
        run: npm install --package-lock-only --legacy-peer-deps

      - name: Run npm audit (JS deps)
        working-directory: ./frontend
        run: |
          npm audit fix --force || true
          npm audit --audit-level=critical --json > npm-audit-report.json || true

      - name: Run gitleaks (Secret scan)
        uses: gitleaks/gitleaks-action@v2 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload security reports
        uses: actions/upload-artifact@65c86b38a5b449054127425461ad9ac0dd024a0c # v6.0.0
        with:
          name: security-reports
          path: |
            frontend/npm-audit-report.json
          if-no-files-found: warn
