---
name: Security Audit

on:
  workflow_dispatch:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

permissions:
  contents: read
  pull-requests: read

jobs:
  security-audit:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@8d9ed9a8d614326213d65127602772e1e8707f4d # v6.0.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --upgrade pip pip-audit

      - name: Run pip-audit (Python deps)
        run: pip-audit -r requirements.txt --ignore-vuln CVE-2025-69872

      - name: Set up Node.js
        uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8 # v6.2.0
        with:
          node-version: "18"

      - name: Prepare frontend lockfile
        working-directory: ./frontend
        run: npm install --package-lock-only --legacy-peer-deps

      - name: Run npm audit (JS deps)
        working-directory: ./frontend
        run: |
          npm audit fix --force || true
          npm audit --audit-level=critical --json > npm-audit-report.json || true

      - name: Run gitleaks (Secret scan)
        uses: gitleaks/gitleaks-action@v2 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload security reports
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v6.0.0
        with:
          name: security-reports
          path: |
            frontend/npm-audit-report.json
          if-no-files-found: warn
