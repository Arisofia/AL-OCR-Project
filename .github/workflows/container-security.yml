name: Container Build & Security

on:
  push:
    paths:
      - "ocr_service/**"
      - ".github/workflows/**"
  workflow_dispatch: {}
  schedule:
    - cron: "0 6 * * *" # Daily at 06:00 UTC

permissions:
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-scan:
    name: Build & Security Scan
    runs-on: ubuntu-22.04
    env:
      FAIL_ON_SCAN: "true"
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Docker image
        id: build_image
        run: |
          IMAGE=al-ocr-service:ci
          docker build -t "$IMAGE" -f ocr_service/Dockerfile .
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

      - name: Trivy Scan (Table)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: al-ocr-service:ci
          format: "table"
          exit-code: "0"
          severity: "CRITICAL,HIGH"

      - name: Trivy Scan (SARIF)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: al-ocr-service:ci
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-results.sarif"

      - name: Install Dockle
        run: |
          DOCKLE_VERSION="0.4.14"
          curl -fsSL "https://github.com/goodwithtech/dockle/releases/download/v${DOCKLE_VERSION}/dockle_${DOCKLE_VERSION}_Linux-64bit.tar.gz" | tar xz
          sudo mv dockle /usr/local/bin/

      - name: Run Dockle
        run: |
          dockle --exit-code 1 -af config.py al-ocr-service:ci
        continue-on-error: true

      - name: Upload Scan Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: container-scans
          path: |
            trivy-results.sarif
