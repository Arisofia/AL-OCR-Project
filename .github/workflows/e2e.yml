name: Playwright E2E

on:
  pull_request:
    paths:
      - "frontend/**"
      - "ocr_service/**"
      - ".github/workflows/e2e.yml"
  workflow_dispatch: {}

jobs:
  e2e:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Python
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c   # v6.0.0
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8   # v6.2.0
        with:
          node-version: "20"

      - name: Install system deps
        run: |
          # Hosted runners can include transient Microsoft/Azure apt sources
          # under varying filenames; remove any matching entries defensively.
          for src in /etc/apt/sources.list.d/*.list /etc/apt/sources.list.d/*.sources; do
            [ -e "$src" ] || continue
            if grep -qiE 'packages\.microsoft\.com|azure-cli' "$src"; then
              sudo rm -f "$src"
            fi
          done
          sudo apt-get update
          # libgl1-mesa-glx may be unavailable on Ubuntu 24.04
          sudo apt-get install -y \
            tesseract-ocr \
            libtesseract-dev \
            libglib2.0-0 \
            libgbm1 \
            libgtk-3-0 \
            libasound2 \
            libnss3 \
            libxss1

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e ./ocr_reconstruct
          pip install pip-audit

      - name: Run pip-audit
        run: pip-audit --ignore-vuln GHSA-w8v5-vhqr-4h9v --skip-editable

      - name: Cache npm
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830   # v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install Node deps
        working-directory: ./frontend
        run: |
          npm ci --legacy-peer-deps

      - name: Run npm audit
        working-directory: ./frontend
        run: npm audit --audit-level=critical

      - name: Run Frontend Lint
        working-directory: ./frontend
        run: npm run lint

      - name: Frontend Dependency Scan (Trivy CLI)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/frontend:/workspace/frontend:ro" \
            aquasec/trivy:0.55.0 fs \
            --format table \
            --exit-code 1 \
            --ignore-unfixed \
            --severity CRITICAL,HIGH \
            --skip-dirs /workspace/frontend/node_modules \
            /workspace/frontend

      - name: Cache Playwright browsers
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830   # v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        working-directory: ./frontend
        run: npx playwright install --with-deps

      - name: Build frontend (for preview)
        working-directory: ./frontend
        env:
          VITE_API_BASE: http://localhost:8000
          VITE_API_KEY: ${{ secrets.STAGING_API_KEY || '' }}
        run: |
          npm run build

      - name: Check Netlify secret availability
        id: check_netlify_secrets
        run: |
          if [ -n "${{ secrets.NETLIFY_AUTH_TOKEN }}" ] && [ -n "${{ secrets.NETLIFY_SITE_ID }}" ]; then
            echo "has_netlify=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_netlify=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to Netlify (optional)
        id: netlify_deploy
        if: ${{ steps.check_netlify_secrets.outputs.has_netlify == 'true' }}
        working-directory: ./frontend
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          (npx -y netlify-cli deploy \
            --dir=dist \
            --site="$NETLIFY_SITE_ID" \
            --json --auth="$NETLIFY_AUTH_TOKEN") > netlify-deploy.json || true
          DEPLOY_URL=$(jq -r '.deploy_url' netlify-deploy.json)
          echo "DEPLOY_URL=$DEPLOY_URL" >> "$GITHUB_ENV"
          echo "Deployed preview to $DEPLOY_URL"

      - name: Start backend
        working-directory: ./ocr_service
        env:
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/ocr_service
          OCR_API_KEY: ${{ secrets.OCR_API_KEY || '' }}
        run: |
          nohup uvicorn main:app --host 0.0.0.0 --port 8000 \
            > ../backend.log 2>&1 &
          npx wait-on -t 60000 http-get://localhost:8000/health

      - name: Start frontend (serve build when not deploying externally)
        working-directory: ./frontend
        run: |
          if [ -z "$DEPLOY_URL" ]; then
            nohup npx -y http-server dist -p 5173 --silent > ../frontend.log 2>&1 &
            npx wait-on -t 60000 http-get://localhost:5173
          else
            echo "External preview available: $DEPLOY_URL"
          fi

      - name: Run Playwright tests
        working-directory: ./frontend
        env:
          VITE_API_KEY: ${{ secrets.STAGING_API_KEY || '' }}
        run: |
          export BASE_URL="${DEPLOY_URL:-http://localhost:5173}"
          echo "Using BASE_URL=$BASE_URL"
          npx playwright test --config=playwright.config.ts

      - name: Debug Logs on Failure
        if: failure()
        run: |
          echo "--- Backend Logs ---"
          [ -f backend.log ] && cat backend.log || echo "No backend.log found"
          echo "--- Frontend Logs ---"
          [ -f frontend.log ] && cat frontend.log || echo "No frontend.log found"

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f   # v6.0.0
        with:
          name: playwright-artifacts
          path: |
            frontend/test-results
            frontend/playwright-report
            frontend/tests/e2e/**/screenshots
            frontend/tests/e2e/**/videos
            frontend/tests/e2e/**/trace
