name: Playwright E2E

on:
  push:
    branches: ["main", "master", "develop"]
  pull_request:
    paths:
      - "frontend/**"
      - "ocr_service/**"
      - ".github/workflows/e2e.yml"
  workflow_dispatch: {}

jobs:
  e2e:
    name: End-to-End Tests
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            tesseract-ocr \
            libtesseract-dev \
            libglib2.0-0 \
            libgbm1 \
            libgtk-3-0 \
            libasound2 \
            libnss3 \
            libxss1

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          if [ -f ocr_service/requirements.txt ]; then
            pip install -r ocr_service/requirements.txt
          fi
          if [ -f ocr_reconstruct/requirements.txt ]; then
            pip install -r ocr_reconstruct/requirements.txt
          fi
          pip install pip-audit

      - name: Run pip-audit
        run: pip-audit || true

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install Node deps
        working-directory: ./frontend
        run: |
          npm ci

      - name: Run npm audit
        working-directory: ./frontend
        run: npm audit --audit-level=high || true

      - name: Run Frontend Lint
        working-directory: ./frontend
        run: npm run lint || true

      - name: Frontend Dependency Scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "frontend"
          format: "table"
          exit-code: "0"
          ignore-unfixed: true
          severity: "CRITICAL,HIGH"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        working-directory: ./frontend
        run: npx playwright install --with-deps

      - name: Build frontend
        working-directory: ./frontend
        env:
          VITE_API_BASE: http://localhost:8000
          VITE_API_KEY: ${{ secrets.STAGING_API_KEY || '' }}
        run: |
          npm run build

      - name: Start backend
        working-directory: ./ocr_service
        env:
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/ocr_service
          OCR_API_KEY: ${{ secrets.OCR_API_KEY || 'test-key' }}
        run: |
          nohup python -m uvicorn main:app --host 0.0.0.0 --port 8000 > ../backend.log 2>&1 &
          # Wait for backend to be ready
          timeout 60 bash -c 'until curl -f http://localhost:8000/health 2>/dev/null; do sleep 2; done' || true

      - name: Start frontend
        working-directory: ./frontend
        run: |
          nohup npx -y http-server dist -p 5173 --silent > ../frontend.log 2>&1 &
          # Wait for frontend to be ready
          timeout 60 bash -c 'until curl -f http://localhost:5173 2>/dev/null; do sleep 2; done' || true

      - name: Run Playwright tests
        working-directory: ./frontend
        env:
          VITE_API_KEY: ${{ secrets.STAGING_API_KEY || 'test-key' }}
        run: |
          export BASE_URL="http://localhost:5173"
          npx playwright test --config=playwright.config.ts || npx playwright test

      - name: Debug Logs on Failure
        if: failure()
        run: |
          echo "--- Backend Logs ---"
          [ -f backend.log ] && cat backend.log || echo "No backend.log found"
          echo "--- Frontend Logs ---"
          [ -f frontend.log ] && cat frontend.log || echo "No frontend.log found"

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            frontend/test-results
            frontend/playwright-report
            frontend/tests/e2e/**/screenshots
            frontend/tests/e2e/**/videos
            frontend/tests/e2e/**/trace
