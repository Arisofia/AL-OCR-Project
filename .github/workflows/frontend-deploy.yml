---
name: Frontend Deploy

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-deploy.yml"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  deploy-frontend:
    runs-on: ubuntu-22.04
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      OCR_API_KEY: ${{ secrets.OCR_API_KEY }}
      OCR_BACKEND_URL:
        ${{ fromJSON(toJSON(vars))[format('{0}', 'OCR_BACKEND_URL')] || 'https://e2bb7336nub3gwutziiz355cbm0geswv.lambda-url.us-east-1.on.aws' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v6.0.2

      - name: Validate required secrets
        run: |
          for v in VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID OCR_API_KEY; do
            if [ -z "${!v}" ]; then
              echo "Missing required secret: $v"
              exit 1
            fi
          done

      - name: Set up Node.js
        uses: actions/setup-node@v6 # v6.2.0
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend (production)
        working-directory: ./frontend
        env:
          VITE_API_BASE: /api
        run: npm run build

      - name: Link Vercel project (CI)
        run: |
          mkdir -p frontend/.vercel
          cat > frontend/.vercel/project.json <<EOF
          {"orgId":"$VERCEL_ORG_ID","projectId":"$VERCEL_PROJECT_ID"}
          EOF

      - name: Resolve Vercel deploy user (CI)
        id: vercel_whoami
        run: |
          set -euo pipefail
          user_json="$(curl -fsS -H "Authorization: Bearer $VERCEL_TOKEN" https://api.vercel.com/v2/user)"
          email="$(echo "$user_json" | jq -r '.user.email // empty')"
          username="$(echo "$user_json" | jq -r '.user.username // empty')"
          if [ -z "$email" ] || [ -z "$username" ]; then
            echo "Failed to resolve Vercel user identity from API response"
            exit 1
          fi
          echo "email=$email" >> "$GITHUB_OUTPUT"
          echo "username=$username" >> "$GITHUB_OUTPUT"

      - name: Deploy frontend to Vercel (production)
        id: vercel_deploy
        working-directory: ./frontend
        run: |
          set -euo pipefail

          # Vercel can block deployments when the Git commit author email doesn't belong to a member of
          # the target team. We override the commit author metadata to the token's user.
          out="$(
            npx -y vercel deploy . \
              --prod \
              --yes \
              --token "$VERCEL_TOKEN" \
              -m githubCommitSha="$GITHUB_SHA" \
              -m githubCommitRef="$GITHUB_REF_NAME" \
              -m githubCommitAuthorEmail="${{ steps.vercel_whoami.outputs.email }}" \
              -m githubCommitAuthorLogin="${{ steps.vercel_whoami.outputs.username }}" \
              -b VITE_API_BASE=/api \
              -e OCR_API_KEY="$OCR_API_KEY" \
              -e OCR_BACKEND_URL="$OCR_BACKEND_URL" 2>&1 | tee /dev/stderr
          )"

          DEPLOY_URL="$(printf '%s\n' "$out" | awk '/^Production: /{print $2}' | tail -n 1)"
          if [ -z "$DEPLOY_URL" ]; then
            DEPLOY_URL="$(printf '%s\n' "$out" | grep -Eo 'https://[^[:space:]]+' | tail -n 1)"
          fi
          if [ -z "$DEPLOY_URL" ]; then
            echo "Failed to resolve deploy URL from Vercel output"
            exit 1
          fi
          echo "deploy_url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
          echo "Deployed production frontend URL: $DEPLOY_URL"

      - name: Smoke check frontend proxy health
        run: |
          URL="${{ steps.vercel_deploy.outputs.deploy_url }}/api/health"
          echo "Checking $URL"
          curl -fsS "$URL"
