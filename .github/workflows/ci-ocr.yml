---
name: AL-OCR CI & Integrity Pipeline

on:
  push:
    branches: ["main", "master", "develop"]
  pull_request:
    branches: ["main", "master", "develop"]

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build, Lint & Test Environment
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
      - name: Install System Dependencies (Tesseract & Leptonica)
        run: |
          # Hosted runners can include transient Microsoft/Azure apt sources
          # under varying filenames; remove any matching entries defensively.
          for src in /etc/apt/sources.list.d/*.list /etc/apt/sources.list.d/*.sources; do
            [ -e "$src" ] || continue
            if grep -qiE 'packages\\.microsoft\\.com|azure-cli' "$src"; then
              sudo rm -f "$src"
            fi
          done
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository -y ppa:alex-p/tesseract-ocr5
          sudo apt-get update
          sudo apt-get install -y \
            tesseract-ocr \
            tesseract-ocr-spa \
            tesseract-ocr-eng \
            libtesseract-dev \
            libleptonica-dev \
            pkg-config \
            libgl1 \
            libglib2.0-0
          tesseract --version
      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          pip install -e ./ocr_reconstruct
      - name: Lint with Ruff
        run: |
          ruff check .
      - name: Run Unit & Integration Tests
        env:
          PYTHONPATH: ${{ github.workspace }}
          OCR_API_KEY: "test-key"
        run: python -m pytest --verbose --cov=./ --cov-report=xml
      - name: Upload Test Coverage
        if: always() && hashFiles('coverage.xml') != ''
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report-${{ matrix.python-version }}
          path: coverage.xml
