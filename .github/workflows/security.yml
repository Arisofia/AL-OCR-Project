---
name: Security & Audit
on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]
  schedule:
    - cron: "0 0 * * 1"  # Weekly

permissions:
  contents: read
  security-events: write
  pull-requests: read

jobs:
  static-analysis:
    name: Static Security Analysis
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0

      - name: Gitleaks (Secret Scan)
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7   # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405   # v6.2.0
        with:
          python-version: "3.11"

      - name: Dependency Audit (Python)
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt --ignore-vuln CVE-2025-69872

  container-scan:
    name: Container Security Scan
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0

      - name: Build local image
        run: docker build -t al-ocr-service:local -f ocr_service/Dockerfile .

      - name: Trivy Vulnerability Scan
        uses: aquasecurity/trivy-action@1f0aa582c8c8f5f7639610d6d38baddfea4fdcee   # 0.9.2
        with:
          image-ref: "al-ocr-service:local"
          format: "table"
          severity: "CRITICAL,HIGH"

  frontend-audit:
    name: Frontend Security Audit
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8   # v6.2.0
        with:
          node-version: "18"
      - name: npm Audit
        run: |
          cd frontend
          npm install --package-lock-only --legacy-peer-deps
          npm audit fix --force || true
          npm audit --audit-level=critical
