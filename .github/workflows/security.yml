---
name: Security & Audit
on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]
  schedule:
    - cron: "0 0 * * 1"  # Weekly

permissions:
  contents: read
  security-events: write
  pull-requests: read

jobs:
  static-analysis:
    name: Static Security Analysis
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v6.0.2
        with:
          fetch-depth: 0

      - name: Gitleaks (Secret Scan)
        uses: gitleaks/gitleaks-action@v2 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@397525782c16c74a026bb9f248147482888e98a3 # v6.0.0
        with:
          python-version: "3.11"

      - name: Dependency Audit (Python)
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt --ignore-vuln CVE-2025-69872

  container-scan:
    name: Container Security Scan
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v6.0.2
        with:
          fetch-depth: 0

      - name: Build local image
        run: docker build -t al-ocr-service:local -f ocr_service/Dockerfile .

      - name: Trivy Vulnerability Scan
        uses: aquasecurity/trivy-action@c1824fd6edce30d7ab345a9989de00bbd46ef284
        with:
          image-ref: "al-ocr-service:local"
          format: "table"
          severity: "CRITICAL,HIGH"

  frontend-audit:
    name: Frontend Security Audit
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v6.0.2
        with:
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v6.2.0
        with:
          node-version: "18"
      - name: npm Audit
        run: |
          cd frontend
          npm install --package-lock-only --legacy-peer-deps
          npm audit fix --force || true
          npm audit --audit-level=critical
