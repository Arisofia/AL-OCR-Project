---
name: Build and publish container
on:
  push:
    branches: [main]

permissions:
  packages: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      GHCR_PAT: ${{ secrets.GHCR_PAT }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3 # v3.7.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3 # v3.12.0

      # Prefer a PAT when configured (it can bypass org/repo GHCR restrictions),
      # but fall back to GITHUB_TOKEN so a stale/incorrect PAT doesn't break builds.
      - name: Log in to GHCR (PAT)
        id: login_pat
        if: ${{ env.GHCR_PAT != '' }}
        continue-on-error: true
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ env.GHCR_PAT }}

      - name: Log in to GHCR (GITHUB_TOKEN)
        if: ${{ steps.login_pat.outcome != 'success' }}
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (primary auth)
        id: build_push_primary
        continue-on-error: true
        uses: docker/build-push-action@v6 # v6.15.0
        with:
          context: .
          file: ./ocr_service/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/arisofia/al-ocr-project:${{ github.sha }}
            ghcr.io/arisofia/al-ocr-project:latest
          build-args: |
            PIP_EXTRA_INDEX_URL=""

      - name: Log in to GHCR (GITHUB_TOKEN retry)
        if: ${{ steps.build_push_primary.outcome != 'success' }}
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (GITHUB_TOKEN retry)
        id: build_push_retry
        if: ${{ steps.build_push_primary.outcome != 'success' }}
        continue-on-error: true
        uses: docker/build-push-action@v6 # v6.15.0
        with:
          context: .
          file: ./ocr_service/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/arisofia/al-ocr-project:${{ github.sha }}
            ghcr.io/arisofia/al-ocr-project:latest
          build-args: |
            PIP_EXTRA_INDEX_URL=""

      - name: Fail if image publish failed after retry
        if: ${{ steps.build_push_primary.outcome != 'success' && steps.build_push_retry.outcome != 'success' }}
        run: |
          echo "Primary and retry image publish attempts failed."
          exit 1

      - name: Set image tag output
        if: ${{ steps.build_push_primary.outcome == 'success' || steps.build_push_retry.outcome == 'success' }}
        run: echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_ENV
