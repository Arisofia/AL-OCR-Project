---
name: Build and publish container
on:
  push:
    branches: [main]

permissions:
  packages: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Prefer a PAT when configured (it can bypass org/repo GHCR restrictions),
      # but fall back to GITHUB_TOKEN so a stale/incorrect PAT doesn't break builds.
      - name: Log in to GHCR (PAT)
        id: login_pat
        if: ${{ secrets.GHCR_PAT != '' }}
        continue-on-error: true
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Log in to GHCR (GITHUB_TOKEN)
        if: ${{ steps.login_pat.outcome != 'success' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./ocr_service/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/arisofia/al-ocr-project:${{ github.sha }}
            ghcr.io/arisofia/al-ocr-project:latest
          build-args: |
            PIP_EXTRA_INDEX_URL=""

      - name: Set image tag output
        run: echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_ENV
