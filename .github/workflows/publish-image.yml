---
name: Build and publish container
on:
  push:
    branches: [main]

permissions:
  packages: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize GHCR owner
        run: echo "GHCR_OWNER_LC=$(echo "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./ocr_service/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ env.GHCR_OWNER_LC }}/al-ocr-project:${{ github.sha }}
            ghcr.io/${{ env.GHCR_OWNER_LC }}/al-ocr-project:latest
          build-args: |
            PIP_EXTRA_INDEX_URL=""

      - name: Set image tag output
        run: echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_ENV
