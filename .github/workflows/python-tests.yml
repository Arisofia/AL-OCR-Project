---
name: Python Tests

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  gitleaks:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v6.0.2
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install System Dependencies
        run: |
          # Hosted runners can include transient Microsoft/Azure apt sources
          # under varying filenames; remove any matching entries defensively.
          for src in /etc/apt/sources.list.d/*.list /etc/apt/sources.list.d/*.sources; do
            [ -e "$src" ] || continue
            if grep -qiE 'packages\\.microsoft\\.com|azure-cli' "$src"; then
              sudo rm -f "$src"
            fi
          done
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository -y ppa:alex-p/tesseract-ocr5
          sudo apt-get update
          sudo apt-get install -y \
            tesseract-ocr \
            tesseract-ocr-spa \
            tesseract-ocr-eng \
            libtesseract-dev \
            libleptonica-dev \
            pkg-config \
            libgl1 \
            libglib2.0-0

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e ./ocr_reconstruct

      - name: Run Security Audit
        if: matrix.python-version == '3.11'
        run: pip-audit --ignore-vuln CVE-2025-69872

      - name: Run YAML Lint
        run: yamllint .

      - name: Generate synthetic images
        run: |
          python ocr_reconstruct/tests/generate_samples.py

      - name: Run Tests
        env:
          PYTHONPATH: ${{ github.workspace }}
          OCR_API_KEY: "test-key"
        run: python -m pytest --cov=./ --cov-report=term --cov-report=xml

      - name: Upload Coverage
        if: always() && hashFiles('coverage.xml') != ''
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: coverage-report-${{ matrix.python-version }}
          path: coverage.xml
