---
name: Deploy
on:
  push:
    branches:
      - main
  workflow_dispatch: {}
permissions:
  contents: read
  id-token: write
jobs:
  deploy:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683   # v4.2.2

      - name: Set up Node.js
        uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8   # v6.2.0
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7   # v6.0.0
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy application
        env:
          OCR_API_KEY: ${{ secrets.OCR_API_KEY }}
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
          DATASET_UPLOAD_KEY: ${{ fromJSON(toJSON(secrets))[format('{0}', 'DATASET_UPLOAD_KEY')] || '' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || '' }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || '' }}
          HUGGING_FACE_HUB_TOKEN: ${{ secrets.HUGGING_FACE_HUB_TOKEN || '' }}
          ENABLE_BIN_LOOKUP: ${{ fromJSON(toJSON(vars))[format('{0}', 'ENABLE_BIN_LOOKUP')] || '' }}
          REDIS_HOST: ${{ fromJSON(toJSON(vars))[format('{0}', 'REDIS_HOST')] || '' }}
          REDIS_PORT: ${{ fromJSON(toJSON(vars))[format('{0}', 'REDIS_PORT')] || '' }}
          REDIS_DB: ${{ fromJSON(toJSON(vars))[format('{0}', 'REDIS_DB')] || '' }}
          REDIS_PASSWORD: ${{ fromJSON(toJSON(secrets))[format('{0}', 'REDIS_PASSWORD')] || '' }}
          REDIS_STARTUP_CHECK: ${{ fromJSON(toJSON(vars))[format('{0}', 'REDIS_STARTUP_CHECK')] || '' }}
          # Fall back to production defaults when optional secrets are missing.
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY || 'al-ocr-service' }}
          LAMBDA_FUNCTION_NAME: ${{ secrets.AWS_LAMBDA_FUNCTION_NAME || 'AL-OCR-Upload-API' }}
          AWS_LAMBDA_ROLE_ARN: ${{ secrets.AWS_LAMBDA_ROLE_ARN }}
          # Keep image publishing non-blocking when Lambda provisioning
          # permissions are missing in the target AWS account.
          LAMBDA_DEPLOY_STRICT: "false"
        run: npm run deploy
