---
name: Docker Deploy

on:
  push:
    branches:
      - main
    paths:
      - "ocr_service/**"
      - "ocr_reconstruct/**"
      - ".github/workflows/docker-deploy.yml"
  pull_request:
    branches:
      - main
    paths:
      - "ocr_service/**"
      - "ocr_reconstruct/**"
      - ".github/workflows/docker-deploy.yml"

permissions:
  contents: read
  id-token: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Configure AWS Credentials
        if:
          ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        uses: aws-actions/configure-aws-credentials@010d0da01d0b5a38af31e9c7ec00174257bba011 # v6.0.0
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: us-east-1
      - name: Confirm AWS identity (debug)
        if:
          ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        run: |
          echo "Confirming AWS identity (debug)"
          aws sts get-caller-identity || true
      - name: Login to ECR
        if:
          ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        run: |
          aws ecr get-login-password --region us-east-1 | \
            docker login --username AWS --password-stdin \
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
      - name: Build image
        run: |
          COMMIT_TAG=$(git rev-parse --short HEAD)
          IMAGE_URI=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/al-ocr-service:${COMMIT_TAG}
          docker buildx create --use || true
          if [ "$GITHUB_EVENT_NAME" = "push" ] && [ "$GITHUB_REF" = "refs/heads/main" ]; then
            echo "On main push: pushing image to ECR"
            docker buildx build \
              --platform linux/amd64 \
              --provenance=false \
              --sbom=false \
              -t $IMAGE_URI \
              --push \
              -f ./ocr_service/Dockerfile \
              .
          else
            echo "Non-push or non-main: building and loading image locally"
            docker buildx build \
              --platform linux/amd64 \
              --provenance=false \
              --sbom=false \
              -t $IMAGE_URI \
              --load \
              -f ./ocr_service/Dockerfile \
              .
          fi
          # On non-push events, we just build to verify the Dockerfile

      - name: Update Lambda image
        if:
          ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        env:
          FUNCTION_NAME_SECRET: ${{ secrets.AWS_LAMBDA_FUNCTION_NAME }}
        run: |
          COMMIT_TAG=$(git rev-parse --short HEAD)
          IMAGE_URI=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/al-ocr-service:${COMMIT_TAG}

          DEFAULT_FUNCTION_NAME="AL-OCR-Upload-API"
          FUNCTION_NAME="${FUNCTION_NAME_SECRET:-$DEFAULT_FUNCTION_NAME}"
          FUNCTION_NAME="${FUNCTION_NAME#"${FUNCTION_NAME%%[![:space:]]*}"}"
          FUNCTION_NAME="${FUNCTION_NAME%"${FUNCTION_NAME##*[![:space:]]}"}"
          FUNCTION_NAME="${FUNCTION_NAME#\"}"
          FUNCTION_NAME="${FUNCTION_NAME%\"}"
          if [[ "$FUNCTION_NAME" == arn:*:function:* ]]; then
            FUNCTION_NAME="${FUNCTION_NAME##*:function:}"
          fi
          FUNCTION_NAME="${FUNCTION_NAME%%:*}"

          if [[ ! "$FUNCTION_NAME" =~ ^[A-Za-z0-9_-]{1,64}$ ]]; then
            echo "::warning::Invalid AWS_LAMBDA_FUNCTION_NAME; falling back to ${DEFAULT_FUNCTION_NAME}."
            FUNCTION_NAME="$DEFAULT_FUNCTION_NAME"
          fi

          if [[ ! "$FUNCTION_NAME" =~ ^[A-Za-z0-9_-]{1,64}$ ]]; then
            echo "::warning::Lambda update skipped. No valid function name available."
            exit 0
          fi

          if ! aws lambda update-function-code --function-name "$FUNCTION_NAME" --image-uri "$IMAGE_URI"; then
            echo "::warning::Lambda update skipped. Check AWS_LAMBDA_FUNCTION_NAME and IAM permissions."
          fi
